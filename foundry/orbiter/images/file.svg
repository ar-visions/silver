<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg version="1.1" width="256" height="256" viewBox="0 0 256 256"
     xmlns="http://www.w3.org/2000/svg">
  <!-- document page with a folded top-right corner, comfortably inside the
       viewBox (margin all around) so it renders at the same scale as the
       other icons (folder.svg etc.). single fill, no group transform. -->
  <path fill="#ffffff"
        d="M 72 36
           H 160
           L 196 72
           V 220
           H 72
           Z" />
  <!-- the folded corner: a small triangle dimmed so the fold reads -->
  <path fill="#c8c8c8"
        d="M 160 36
           V 72
           H 196
           Z" />
</svg>
