<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="vignette" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.0"/>
    </radialGradient>
    <!-- pointy-top hex, circumradius 24, pattern 41.57 x 72 -->
    <pattern id="hexgrid" x="0" y="0" width="41.57" height="72" patternUnits="userSpaceOnUse">
      <!-- even row hex centred at (20.78, 24) -->
      <polygon points="20.78,0 41.57,12 41.57,36 20.78,48 0,36 0,12"
               fill="none" stroke="#4488cc" stroke-width="0.8"/>
      <!-- odd row hex: left half at tile edge (0, 60) -->
      <polygon points="0,36 20.78,48 20.78,72 0,84 -20.78,72 -20.78,48"
               fill="none" stroke="#4488cc" stroke-width="0.8"/>
      <!-- odd row hex: right half at tile edge (41.57, 60) -->
      <polygon points="41.57,36 62.35,48 62.35,72 41.57,84 20.78,72 20.78,48"
               fill="none" stroke="#4488cc" stroke-width="0.8"/>
    </pattern>
  </defs>
  <rect width="512" height="512" fill="#08090f"/>
  <rect width="512" height="512" fill="url(#hexgrid)" opacity="0.85"/>
  <rect width="512" height="512" fill="url(#vignette)"/>
</svg>
